<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}ECG Analyser{% endblock %}</title>
<style>
  :root {
    --bg: #f0f2f8;
    --surface: #ffffff;
    --border: #dde1ec;
    --text: #1a1d2e;
    --text-dim: #6b7280;
    --accent: #4c6ef5;
    --danger: #dc2626;
    --warn: #d97706;
    --ok: #16a34a;
    --c-bigeminy: #dc2626;
    --c-vtach: #9333ea;
    --c-trigeminy: #d97706;
    --c-couplet: #ea580c;
    --nav-w: 210px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; height: 100vh; overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--nav-w);
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 0;
    overflow-y: auto;
  }
  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 20px 16px 16px;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    letter-spacing: -0.2px;
  }
  .sidebar-brand .brand-icon { font-size: 20px; }
  .nav-section {
    padding: 12px 8px 4px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
    padding-left: 14px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    margin: 1px 6px;
    border-radius: 7px;
    font-size: 13px;
    color: var(--text-dim);
    text-decoration: none;
    transition: background 0.15s, color 0.15s;
    cursor: pointer;
  }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .nav-item.active { background: rgba(108,140,255,0.15); color: var(--accent); font-weight: 600; }
  .nav-item .nav-icon { width: 18px; text-align: center; font-size: 14px; flex-shrink: 0; }
  .nav-divider { height: 1px; background: var(--border); margin: 10px 10px; }

  /* ── Model status in sidebar ── */
  .model-status {
    margin-top: auto;
    padding: 14px 14px 18px;
    border-top: 1px solid var(--border);
  }
  .model-status-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .model-status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }
  .model-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--text-dim);
    transition: background 0.3s;
  }
  .model-dot.loading {
    background: var(--warn);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .model-dot.ready { background: var(--ok); }
  .model-dot.error { background: var(--danger); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .model-text { color: var(--text-dim); }

  /* ── Main content ── */
  .main {
    flex: 1;
    overflow-y: auto;
    min-width: 0;
    padding: 24px;
  }

  {% block extra_styles %}{% endblock %}
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-brand">
    <span class="brand-icon">&#x1FAC0;</span>
    ECG Analyser
  </div>

  <div class="nav-section">Views</div>

  <a href="/analytics" class="nav-item {% if request.endpoint == 'analytics' %}active{% endif %}">
    <span class="nav-icon">&#x1F4CA;</span> Analytics
  </a>
  <a href="/viewer" class="nav-item {% if request.endpoint == 'viewer' %}active{% endif %}">
    <span class="nav-icon">&#x1F4C8;</span> ECG Viewer
  </a>
  <a href="/timeline" class="nav-item {% if request.endpoint == 'timeline' %}active{% endif %}">
    <span class="nav-icon">&#x1F4C5;</span> Timeline
  </a>
  <a href="/ble" class="nav-item {% if request.endpoint == 'ble_monitor' %}active{% endif %}">
    <span class="nav-icon">&#x1F4F6;</span> Live Monitor
  </a>

  <div class="nav-divider"></div>
  <div class="nav-section">Tools</div>

  <a href="/upload" class="nav-item {% if request.endpoint == 'upload' %}active{% endif %}">
    <span class="nav-icon">&#x2B06;</span> Upload
  </a>
  <a href="/reprocess" class="nav-item {% if request.endpoint == 'reprocess_page' %}active{% endif %}">
    <span class="nav-icon">&#x21BA;</span> Reprocess
  </a>

  <div class="model-status">
    <div class="model-status-label">ML Model</div>
    <div class="model-status-row">
      <div class="model-dot loading" id="sidebarModelDot"></div>
      <span class="model-text" id="sidebarModelText">Loading&hellip;</span>
    </div>
  </div>
</nav>

<main class="main">
  {% block content %}{% endblock %}
</main>

<script>
// Poll model status and update sidebar indicator
(function pollModelStatus() {
  var dot = document.getElementById('sidebarModelDot');
  var txt = document.getElementById('sidebarModelText');
  function check() {
    fetch('/api/model_status').then(function(r){ return r.json(); }).then(function(d) {
      dot.className = 'model-dot ' + d.status;
      if (d.status === 'ready') {
        txt.textContent = 'Ready';
        txt.style.color = 'var(--ok)';
      } else if (d.status === 'error') {
        txt.textContent = 'Error';
        txt.style.color = 'var(--danger)';
        txt.title = d.error || '';
      } else {
        txt.textContent = 'Loading\u2026';
        setTimeout(check, 1500);
      }
    }).catch(function() {
      setTimeout(check, 3000);
    });
  }
  check();
})();
</script>

{% block scripts %}{% endblock %}
</body>
</html>
